  { id: "030", title: "Legítimo interesse (LGPD Art. 10) é usado como base genérica para justificar coleta de dados por IAs",

  { id: "034", title: "CC/2002 Art. 186 e 927: responsabilidade civil objetiva do fornecedor de IA por danos a dados",

  { id: "045", title: "Advogados juniores perdem capacidade de julgamento crítico ao usar IA (efeito 'ancoragem cognitiva')",

// Extract unique tags
const allTags = [...new Set(findings.flatMap(f => f.tags))].sort();

function render() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const activeTag = document.querySelector('.tag-btn.active')?.dataset.tag || 'all';
  
  let filtered = findings.filter(f => {
    // Tag filter
    if (activeTag !== 'all' && !f.tags.includes(activeTag)) return false;
    // Search
    if (search) {
      const searchable = (f.title + ' ' + f.body + ' ' + f.citacao + ' ' + f.citacao_ref + ' ' + f.tags.join(' ')).toLowerCase();
      return searchable.includes(search);
    }
    return true;
  });

  const list = document.getElementById('findingsList');
  const countEl = document.getElementById('footerCount');
  
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><p>Nenhum achado encontrado para "${search}"</p></div>`;
    countEl.textContent = '0 achados';
    document.getElementById('resultCount').textContent = '0 achados';
    return;
  }

  list.innerHTML = filtered.map(f => `
    <div class="finding" onclick="toggleFinding(this)">
      <div class="finding-header">
        <div class="finding-num">${f.id}</div>
        <div class="finding-content">
          <div class="finding-title">${f.title}</div>
          <div class="finding-tags">
            ${f.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="finding-body">
        <p>${f.body}</p>
        <div class="citacao" onclick="event.stopPropagation(); this.classList.toggle('expanded-cit')">
          <span class="citacao-label">Citação</span>
          <div class="citacao-texto">${f.citacao}</div>
          <span class="expand-hint">↕ expandir citação</span>
        </div>
        <div style="font-size:0.75rem;color:#555577;margin-top:8px;font-style:italic;">${f.citacao_ref}</div>
      </div>
    </div>
  `).join('');

  countEl.textContent = `${filtered.length} achados`;
  document.getElementById('resultCount').textContent = `${filtered.length} de ${findings.length} achados`;
}

function toggleFinding(el) {
  el.classList.toggle('expanded');
}

// Render tags bar
function renderTags() {
  const bar = document.getElementById('tagsBar');
  bar.innerHTML = `<button class="tag-btn tag-all active" data-tag="all" onclick="filterTag('all', this)">📋 Todos</button>` +
    allTags.map(t => `<button class="tag-btn tag-${t}" data-tag="${t}" onclick="filterTag('${t}', this)">${t.charAt(0).toUpperCase() + t.slice(1)}</button>`).join('');
}

function filterTag(tag, btn) {
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', render);

// Init
renderTags();
render();
</script>
</body>
</html>
