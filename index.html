    citacao: "Até 2025, a ANPD aplicou menos de 30 sanções administrativas desde sua criação em 2020, nenhuma delas direcionada a grandes provedores de tecnologia.",
    citacao_ref: "ANPD. Relatório de Fiscalização 2020-2024. Brasília: ANPD, 2025.",
    body: "Dado objetivo do relatório da ANPD. Interpretações possíveis: (a) a ANPD pode estar priorizando abordagem educativa (a própria diretoria declarou em 2024 que vigorava a 'era da orientação'); (b) pode refletir dificuldade operacional de fiscalização; ou (c) as empresas podem estar em conformidade. O dado, por si só, admite múltiplas leituras. A ANPD anunciou em junho/2025 que a 'era da orientação acabou' e que novas sanções estão em curso — o que sugere mudança de postura." },
    
  { id: "019", title: "Brasil não possui legislação de data residency (residência de dados)", 
    tags: ["brasil", "soberania", "dados"],
    citacao: "Diferentemente de países como Rússia (Lei 242-FZ), China (CSL) e Índia (PDPB 2023), o Brasil não exige que dados de cidadãos brasileiros sejam armazenados em território nacional — criando uma dependência estrutural de provedores estrangeiros.",
    citacao_ref: "Lei Federal Russa 242-FZ (2015); Chinese Cybersecurity Law (2017); Indian Digital Personal Data Protection Bill (2023).",
    body: "Lacuna legislativa crítica: sem data residency, dados de cidadãos brasileiros — incluindo dados sensíveis de processos judiciais — podem estar armazenados em servidores nos EUA, Europa ou Ásia, sujeitos a jurisdições estrangeiras. A LGPD não resolve isso." },
    
  { id: "020", title: "Alta concentração de mercado de IA jurídica em provedores americanos", 
    tags: ["ia", "soberania", "advocacia", "eua"],
    citacao: "As maiores plataformas de IA para o setor jurídico — Casetext/Thomson Reuters (Westlaw AI), LexisNexis Lexis+ AI, Harvey AI, vLex/Vincent AI — são controladas por empresas americanas ou europeias, com servidores e governança fora do Brasil.",
    citacao_ref: "FGV Direito SP (2024). Pesquisa 'Inteligência Artificial na Advocacia Brasileira'. Relatório Técnico; OECD (2024). The AI Legal Market: Concentration and Competition Challenges. OECD Digital Economy Papers.",
    body: "Dependência tecnológica estrangeira: o advogado brasileiro que usa IA jurídica está, em quase todos os casos, usando um serviço cuja governança de dados é estrangeira. A OECD (2024) alerta para riscos de concentração de mercado em IA jurídica. Sem regulação local, não há garantia de que esses dados estejam protegidos pela LGPD." },
    
  { id: "021", title: "Advogados-reportam que utilizam IA sem informar clientes, violando dever de transparência", 
    tags: ["advocacia", "ia", "dados", "direito"],
    citacao: "Pesquisa de 2024 aponta que 47% dos advogados que usam ferramentas de IA não informam seus clientes sobre o uso da tecnologia, o que pode violar o dever de informação (CC Art. 422) e a boa-fé objetiva.",
    citacao_ref: "FGV Direito SP (2024). Pesquisa 'Inteligência Artificial na Advocacia Brasileira'; CC/2002, Art. 422.",
    body: "Problema ético-jurídico: o cliente tem direito a saber se seu caso está sendo analisado por IA e como seus dados estão sendo tratados. A omissão viola a boa-fé objetiva e expõe o advogado a responsabilidade civil." },
    
  { id: "022", title: "Ferramentas de IA gratuitas para advogados (ChatGPT free, Gemini) usam dados para treinamento", 
    tags: ["ia", "dados", "advocacia"],
    citacao: "Os termos de serviço das versões gratuitas de ChatGPT (OpenAI), Gemini (Google) e Copilot (Microsoft) permitem expressamente o uso de dados de entrada para treinamento e melhoria dos modelos, sem garantia de exclusão posterior.",
    citacao_ref: "Termos de Serviço da OpenAI (2024), Google AI Terms (2024), Microsoft Copilot Terms (2024).",
    body: "Risco concreto e imediato: advogados que usam versões gratuitas para analisar documentos estão, de fato, fornecendo dados de clientes para treinar os modelos concorrentes. Mesmo versões pagas têm políticas variáveis de privacidade." },
    
  { id: "023", title: "Good Governance Principles for AI (OCDE+UNESCO) — 9 princípios, nenhum vinculante", 
    tags: ["ia", "regulacao", "europa"],
    citacao: "A UNESCO (2021) e OCDE (2019) estabeleceram 9 princípios complementares para governança de IA, incluindo proporcionalidade, transparência e prestação de contas — todos soft law, sem força vinculante ou sanções.",
    citacao_ref: "UNESCO (2021). Recommendation on the Ethics of Artificial Intelligence; OECD (2019). Principles on AI.",
    body: "Apesar de bem intencionados, os princípios internacionais não têm enforcement. O artigo pode argumentar que a adesão voluntária a princípios de governança não substitui regulação vinculante, especialmente em setores sensíveis como justiça e advocacia." },
    
  { id: "024", title: "Sociedade Brasileira de Direito Internacional (SBDI) aponta conflito LGPD-CLOUD Act como irresolvido", 
    tags: ["soberania", "lgpd", "eua", "direito"],
    citacao: "Análise do Boletim SBDI (2022) conclui que 'a LGPD não oferece mecanismos eficazes para impedir que dados de cidadãos brasileiros armazenados em servidores de empresas americanas sejam acessados pelo governo dos EUA via CLOUD Act'.",
    citacao_ref: "Lopes, S. (2022). Conflito LGPD-CLOUD Act: A (In)eficácia da Proteção de Dados Brasileira. Boletim SBDI, v. 4, n. 2.",
    body: "Citação obrigatória por sugestão do avaliador 1. A Lopes é referência na análise do conflito LGPD-CLOUD Act e sua conclusão apoia diretamente a tese de territorialidade de fato vs. de direito." },
    
  { id: "025", title: "Resolução CNJ 615 não regula algoritmos de IA nem exige auditoria externa", 
    tags: ["brasil", "ia", "direito", "regulacao"],
    citacao: "Resolução CNJ 615/2024 — 'Dispõe sobre o uso de Inteligência Artificial no Poder Judiciário' — não estabelece requisitos de auditoria algorítmica, explicabilidade de decisões, nem padrões de segurança para dados processados por sistemas de IA, limitando-se a diretrizes gerais de transparência.",
    citacao_ref: "CNJ. Resolução 615/2024. Disponível em: cnj.jus.br.",
    body: "A resolução é insuficiente: não exige auditoria externa dos modelos, não estabelece padrões de segurança da informação, não trata de privacidade de dados processados por IA. É um primeiro passo, mas insuficiente para garantir a proteção efetiva de dados no Judiciário." },
    
  { id: "026", title: "Violações de dados em escritórios de advocacia cresceram 340% entre 2020 e 2024", 
    tags: ["dados", "advocacia", "monitoramento"],
    citacao: "Relatório da ABA (American Bar Association) de 2024 aponta aumento de 340% nos incidentes de segurança cibernética em escritórios de advocacia entre 2020 e 2024, com 29% dos escritórios relatando violações de dados de clientes.",
    citacao_ref: "American Bar Association (2024). Cybersecurity TechReport. ABA.",
    body: "Dados internacionais corroboram o risco. Embora o dado seja americano, o Brasil segue tendência similar — escritórios brasileiros são alvos cada vez mais frequentes de ataques cibernéticos, e a adoção de IA sem governança adequada amplifica as superfícies de ataque." },
    
  { id: "027", title: "Princípio da precaução (Direito Ambiental) como analogia para regulação de IA", 
    tags: ["direito", "ia", "regulacao"],
    citacao: "O princípio da precaução (Princípio 15 da Declaração do Rio/92) determina que, na ausência de certeza científica sobre riscos, devem ser adotadas medidas preventivas — analogia aplicável à IA jurídica, onde os riscos à privacidade e ao devido processo legal ainda não são plenamente conhecidos.",
    citacao_ref: "Declaração do Rio sobre Meio Ambiente e Desenvolvimento (1992), Princípio 15.",
    body: "Proposta analógica dos autores: aplicar o princípio da precaução — já consolidado no Direito brasileiro — como fundamento para regulação cautelar de IA no setor jurídico, antes que danos irreversíveis ocorram. A conexão entre o princípio ambiental e a regulação de IA é construção dos autores, não constatação de fonte." },
    
  { id: "028", title: "PL 2338/2023 (Marco Legal da IA): aprovado no Senado, tramita na Câmara em 2026", 
    tags: ["brasil", "ia", "regulacao"],
    citacao: "PL 2338/2023, de autoria do Senador Rodrigo Pacheco (PSD/MG, 03/05/2023). Relatado pelo Senador Eduardo Gomes (PL/TO), foi aprovado pelo Plenário do Senado com substitutivo em 07/06/2024 e remetido à Câmara dos Deputados em 17/03/2025. Na Câmara, é prioridade em 2026 na Comissão Especial, com amplas audiências públicas. Abordagem baseada em risco, inspirada no EU AI Act. 35.806 votos sim × 31.547 não na consulta pública.",
    citacao_ref: "PL 2338/2023. Senado Federal. Tramitação: www25.senado.leg.br/web/atividade/materias/-/materia/157233; Câmara dos Deputados: www.camara.leg.br.",
    body: "Diferentemente do que se afirmava anteriormente, o PL 2338/2023 não está 'parado'. Foi aprovado pelo Senado e remetido à Câmara dos Deputados em março de 2025, onde tramita como prioridade em 2026. O texto original ('Dispõe sobre o uso da IA') foi substituído por versão mais abrangente ('Dispõe sobre o desenvolvimento, fomento e uso ético e responsável da IA com base na centralidade da pessoa humana'). A demora na aprovação final, contudo, permitiu que dezenas de ferramentas de IA jurídica fossem lançadas no mercado sem regulação específica." },
    
  { id: "029", title: "Ferramentas de IA para due diligence expõem dados estratégicos de operações empresariais", 
    tags: ["ia", "dados", "monitoramento", "advocacia"],
    citacao: "Ferramentas de IA para due diligence (análise de contratos, documentos societários, compliance) processam dados altamente sensíveis — estratégias de M&A, propriedade intelectual, informações privilegiadas — que, se violados, causam danos irreparáveis.",
    citacao_ref: "SafeGPT (2024); FGV Direito SP (2024); Termos de serviço de plataformas de IA para due diligence (2024-2025).",
    body: "Due diligence é uma das áreas de maior exposição: dados de operações sigilosas (M&A, IPOs, investigações internas) são carregados em plataformas de IA sem proteção contratual adequada. Uma violação nesse contexto pode inviabilizar a operação inteira." },
    
  { id: "030", title: "Legítimo interesse (LGPD Art. 10) é usado como base genérica para justificar coleta de dados por IAs", 
    tags: ["lgpd", "dados", "ia"],
    citacao: "Art. 10. O legítimo interesse do controlador somente pode fundamentar o tratamento de dados pessoais para finalidades legítimas, consideradas a partir de situações concretas, incluindo, mas não se limitando a: I — apoio e promoção de atividades do controlador. O uso genérico e abstrato do legítimo interesse para fundamentar tratamento de dados por IA tem sido questionado pela doutrina.",
    citacao_ref: "LGPD, Art. 10; Bioni, B. R. (2022). Proteção de Dados Pessoais: A Função e os Limites do Consentimento. Rio de Janeiro: Forense.",
    body: "O legítimo interesse é frequentemente invocado por provedores de IA para justificar processamento de dados que vai além do necessário. A LGPD não veda explicitamente essa base para dados sensíveis, mas a doutrina questiona sua adequação quando o titular não tem como se opor efetivamente." },
    
  { id: "031", title: "CF/88 Art. 5º, X e XII: privacidade e sigilo de dados como direitos fundamentais, mas sem regulação infraconstitucional específica para IA", 
    tags: ["direito", "dados", "brasil", "lgpd"],
    citacao: "Art. 5º, X — 'são invioláveis a intimidade, a vida privada, a honra e a imagem das pessoas'; XII — 'é inviolável o sigilo da correspondência e das comunicações telegráficas, de dados e das comunicações telefônicas' — CF/88.",
    citacao_ref: "Constituição Federal de 1988, Art. 5º, X e XII.",
    body: "Base constitucional sólida para proteção de dados como direito fundamental (ADPF 695 e ADI 6387 do STF). No entanto, o texto constitucional é anterior à era da IA, e sua aplicação a sistemas automatizados de processamento de dados exige mediação legislativa que ainda não ocorreu no Brasil." },
    
  { id: "032", title: "Tribunais brasileiros já utilizam IA para classificar processos sem transparência algorítmica", 
    tags: ["brasil", "ia", "direito", "monitoramento"],
    citacao: "Projetos como RADAR (TJRO), Socrates (TJMG) e Victor (STF) utilizam IA para classificação e triagem de processos, mas sem publicidade dos modelos, métricas de acurácia ou mecanismos de contestação das decisões algorítmicas.",
    citacao_ref: "CNJ (2024). Relatório 'IA no Poder Judiciário'; Resolução CNJ 615/2024; Relatórios dos tribunais.",
    body: "O Judiciário brasileiro já adota IA, mas com transparência limitada. O cidadão tem seu processo classificado por um algoritmo sem saber como ele funciona ou como contestar sua classificação. A resolução CNJ 615 não resolve esse problema." },
    
  { id: "033", title: "Acesso a dados por autoridades estrangeiras sem autorização judicial brasileira: violação à soberania", 
    tags: ["soberania", "dados", "eua", "direito"],
    citacao: "O CLOUD Act permite que autoridades americanas exijam acesso a dados armazenados por provedores americanos mesmo quando os dados estão no exterior — sem necessidade de carta rogatória ou autorização da autoridade judiciária local, o que viola o princípio da soberania nacional (CF Art. 1º, I).",
    citacao_ref: "CLOUD Act (2018), 18 U.S.C. § 2523; CF/88, Art. 1º, I (soberania).",
    body: "Ponto central da tese: a soberania nacional afirmada no Art. 1º da CF é formalmente válida, mas factualmente violada por mecanismos legais estrangeiros (CLOUD Act, FISA 702) que permitem acesso extraterritorial a dados de brasileiros sem controle judicial brasileiro." },
    
  { id: "034", title: "CC/2002 Art. 186 e 927: responsabilidade civil objetiva do fornecedor de IA por danos a dados", 
    tags: ["direito", "dados", "ia", "brasil"],
    citacao: "Art. 186. Aquele que, por ação ou omissão voluntária, negligência ou imprudência, violar direito e causar dano a outrem, ainda que exclusivamente moral, comete ato ilícito. Art. 927. Aquele que, por ato ilícito causar dano a outrem, fica obrigado a repará-lo. — CC/2002. A responsabilidade objetiva pode ser aplicada a provedores de IA que causem danos por violação de dados no CDC e na LGPD.",
    citacao_ref: "CC/2002, Arts. 186, 927; CDC Art. 14; LGPD Arts. 42-45.",
    body: "Enquadramento jurídico: provedores de IA podem responder objetivamente por danos decorrentes de violação de dados, tanto pelo CDC (relação de consumo) quanto pela LGPD (atividade de tratamento). O desafio é a execução dessa responsabilidade contra empresas estrangeiras sem representação no Brasil." },
    
  { id: "035", title: "Ferramentas de AI governance permitem que empregadores monitorem produtividade de advogados em tempo real", 
    tags: ["monitoramento", "advocacia", "dados"],
    citacao: "Sistemas de monitoramento remoto de produtividade registram teclas digitadas, screenshots, sites visitados e tempo gasto por tarefa, capturando potencialmente comunicações privilegiadas advogado-cliente.",
    citacao_ref: "Olorunlana, T.J. (2025). Securing the Global Cloud: Addressing Data Sovereignty in Cross-Border Data Flows. International Journal of Scientific Advances in Technology and Engineering, 3(1); Citron & Pasquale (2014), op. cit.",
    body: "Risco concreto demonstrado por Olorunlana (2025) e Citron & Pasquale (2014): sistemas automatizados de monitoramento carecem de salvaguardas para comunicações privilegiadas. Escritórios que adotam essas ferramentas sem segmentação adequada expõem dados de clientes a terceiros." },
    
  { id: "036", title: "Número crescente de provedores de IA jurídica sem certificação de segurança", 
    tags: ["ia", "dados", "advocacia", "regulacao"],
    citacao: "Levantamento de 2024 identificou mais de 200 startups de IA jurídica no mercado global; menos de 15% possuem certificações de segurança como SOC2, ISO 27001 ou GDPR compliance — métricas básicas de governança de dados.",
    citacao_ref: "LegalTech News (2024); FGV Direito SP (2024); Relatórios de segurança das plataformas.",
    body: "Mercado de IA jurídica cresce rápido, mas sem padrões mínimos de segurança. A maioria das startups não tem certificações básicas. O advogado que contrata essas ferramentas assume o risco sem informação adequada." },
    
  { id: "037", title: "FISA Section 702 permite vigilância em massa de comunicações estrangeiras, incluindo dados brasileiros", 
    tags: ["eua", "dados", "monitoramento", "soberania"],
    citacao: "FISA Section 702 autoriza o governo americano a interceptar comunicações de 'não-americanos' fora dos EUA — incluindo brasileiros — sem mandado judicial individualizado, desde que o alvo seja razoavelmente considerado estrangeiro.",
    citacao_ref: "FISA Section 702; Reforming Intelligence and Securing America Act (2024); Congressional Research Service (2024).",
    body: "Programa de vigilância que captura comunicações de cidadãos brasileiros sem qualquer controle judicial brasileiro. Quando dados trafegam em servidores americanos ou passam por infraestrutura de provedores americanos, podem ser alvo de vigilância sem que o titular saiba ou possa contestar." },
    
  { id: "038", title: "LGPD Art. 18 garante direitos do titular (confirmação, acesso, correção, portabilidade), mas execução depende do controlador", 
    tags: ["lgpd", "dados", "brasil"],
    citacao: "Art. 18. O titular tem direito a obter do controlador, em relação aos seus dados pessoais: I — confirmação da existência de tratamento; II — acesso aos dados; III — correção de dados; IV — anonimização, bloqueio ou eliminação; V — portabilidade.",
    citacao_ref: "LGPD, Art. 18.",
    body: "Direitos formalmente garantidos, mas cuja execução prática contra provedores estrangeiros é inviável. Como exercer o direito de portabilidade ou eliminação de dados contra uma empresa americana sem representação no Brasil e que opera sob jurisdição do CLOUD Act?" },
    
  { id: "039", title: "STF reconhece proteção de dados como direito fundamental autônomo (ADIs 6387, 6390, 6393)", 
    tags: ["direito", "dados", "brasil"],
    citacao: "O STF, no julgamento conjunto das ADIs 6387, 6390 e 6393 (2020), reconheceu a proteção de dados pessoais como direito fundamental autônomo, com fundamento no Art. 5º, X e XII da CF/88 — independentemente de previsão expressa no texto original.",
    citacao_ref: "STF. ADI 6387/DF, Rel. Min. Rosa Weber, j. 07/05/2020; ADI 6390; ADI 6393.",
    body: "Marco jurisprudencial importante: o STF elevou a proteção de dados à categoria de direito fundamental antes mesmo da EC 115/2022 (que incluiu a proteção de dados no Art. 5º). Reforça a tese de que o Estado brasileiro tem dever ativo de proteger dados de cidadãos contra acesso estrangeiro não autorizado." },
    
  { id: "040", title: "EC 115/2022 inclui proteção de dados pessoais como direito fundamental no Art. 5º da CF", 
    tags: ["direito", "dados", "brasil"],
    citacao: "EC 115/2022 acrescentou o inciso LXXIX ao Art. 5º da CF: 'é assegurado, nos termos da lei, o direito à proteção dos dados pessoais, inclusive nos meios digitais' — consolidando constitucionalmente o direito à proteção de dados.",
    citacao_ref: "Emenda Constitucional 115/2022, Art. 5º, LXXIX.",
    body: "Base constitucional expressa. O direito à proteção de dados agora está no catálogo de direitos fundamentais. A questão que se coloca é: esse direito fundamental é efetivo (eficácia kelseniana) quando dados estão sob jurisdição estrangeira?" },
    
  { id: "041", title: "Sociedade de risco (Beck) e IA: riscos não calculáveis como fundamento para precaução regulatória", 
    tags: ["direito", "ia", "regulacao"],
    citacao: "Beck (1992) desenvolve o conceito de 'sociedade de risco': na modernidade tardia, os riscos da tecnologia não são plenamente calculáveis ou seguráveis, exigindo novas formas de ação preventiva.",
    citacao_ref: "Beck, U. (1992). Risk Society: Towards a New Modernity. London: Sage; Krištofík, A. (2025). Bias in AI (Supported) Decision Making. International Journal for Court Administration, 16(1).",
    body: "Aplicação analógica do framework de Beck ao contexto da IA jurídica: assim como Beck demonstrou que riscos industriais modernos são incalculáveis, autores do artigo propõem que riscos de IA (vieses algorítmicos, violações de privacidade) têm características similares. Krištofík (2025) confirma que vieses em decisões assistidas por IA no Judiciário são riscos não calculáveis que exigem ação preventiva. A conexão entre Beck e IA é construção analítica dos autores." },
    
  { id: "042", title: "Recusa terapêutica do paciente: o direito de recusar tratamento de dados pessoais como expressão da autonomia", 
    tags: ["direito", "dados", "lgpd"],
    citacao: "Assim como o paciente tem o direito de recusar tratamento médico (CF Art. 5º, III — ninguém será submetido a tratamento desumano ou degradante; CC Art. 15), o titular de dados deve ter o direito efetivo de recusar o tratamento de seus dados pessoais por sistemas de IA — direito hoje inviabilizado pelo modelo 'take-it-or-leave-it' de adesão a plataformas.",
    citacao_ref: "CF/88 Art. 5º, III; CC/2002 Art. 15; Bioni, B. R. (2022). Proteção de Dados Pessoais: A Função e os Limites do Consentimento. Rio de Janeiro: Forense, Cap. 4.",
    body: "Proposição dos autores: analogia entre recusa terapêutica (reconhecida pelo STJ) e recusa de tratamento de dados (não regulada). Esta é uma construção argumentativa, não um dado de fonte. Bioni (2022) demonstra que o modelo atual de consentimento ('take-it-or-leave-it') inviabiliza o exercício real da autonomia do titular, o que fundamenta a analogia proposta." },
    
  { id: "043", title: "Paradoxo regulatório: soft law internacional é seguida, hard law nacional é ignorada", 
    tags: ["regulacao", "brasil", "ia", "soberania"],
    citacao: "Empresas de tecnologia seguem voluntariamente princípios de governança de IA da OCDE e UNESCO (soft law) para reputação e acesso a mercados internacionais, enquanto descumprem sistematicamente a LGPD (hard law brasileira) — invertendo a lógica de que lei nacional deve prevalecer.",
    citacao_ref: "SafeGPT (2024); FGV Direito SP (2024); OECD AI Principles (2019); UNESCO Ethics Recommendations (2021); LGPD (2018).",
    body: "Interpretação dos autores: as mesmas big techs que publicam relatórios de 'Responsible AI' alinhados com princípios internacionais descumprem a LGPD sem consequências. A soft law internacional tem mais enforcement reputacional que a hard law nacional — o que revela a fraqueza da soberania legislativa brasileira." },
    
  { id: "044", title: "Good Governance Principles: princípio de 'accountability' exige que organizações respondam por impactos de IA, mas sem sanção em caso de descumprimento", 
    tags: ["ia", "regulacao", "europa"],
    citacao: "O princípio de accountability na Recomendação da UNESCO (2021) estabelece que 'organizações e desenvolvedores de IA devem prestar contas pelo funcionamento adequado dos sistemas de IA e pelo respeito aos direitos humanos' — não há, contudo, previsão de sanção pelo descumprimento.",
    citacao_ref: "UNESCO (2021). Recommendation on the Ethics of Artificial Intelligence, Principle 6 (Accountability); Lejniece, I. (2025). Good Governance Principles for AI.",
    body: "Mesmo os princípios mais avançados de governança de IA pecam por falta de enforcement. Accountability sem sanção é letra morta — o que reforça a tese de que o Brasil precisa de regulação vinculante e não apenas adesão voluntária a princípios." },
    
  { id: "045", title: "Advogados juniores perdem capacidade de julgamento crítico ao usar IA (efeito 'ancoragem cognitiva')", 
    tags: ["advocacia", "ia"],
    citacao: "O experimento 'Thinking Like a Lawyer' demonstrou que associados juniores que usam IA tendem a ancorar seu raciocínio na saída da IA, mesmo quando instruídos a exercer julgamento independente — fenômeno mais pronunciado em tarefas complexas que exigem raciocínio jurídico sofisticado.",
    citacao_ref: "Thinking Like a Lawyer? AI-Powered Lawyering and Its Impact on Junior Associates (SSRN 5260645), 2025.",
    body: "Efeito cognitivo preocupante: a IA não apenas substitui tarefas, mas altera o próprio processo de raciocínio do advogado. Juniores perdem a capacidade de identificar erros porque a saída da IA 'parece' autoritativa. Risco de degradação sistêmica da qualidade jurídica a longo prazo." },
    
  { id: "046", title: "RAG + chain-of-thought melhora qualidade, mas requer base jurídica curada e atualizada", 
    tags: ["ia", "advocacia"],
    citacao: "No RCT de Schwarcz (2026), a combinação RAG + chain-of-thought elevou a qualidade em 36%, mas o benefício desapareceu quando a base de conhecimento estava desatualizada ou continha erros — sugerindo que a qualidade da IA jurídica depende criticamente da curadoria humana.",
    citacao_ref: "Schwarcz, D. (2026). AI-Powered Lawyering: A Randomized Controlled Trial. SSRN.",
    body: "Achado ambivalente: RAG + reasoning funciona, mas não substitui curadoria humana. Escritórios que implementam IA sem investir em bases jurídicas curadas e atualizadas podem obter resultados piores do que sem IA — criando falsa sensação de segurança." },
    
  { id: "047", title: "Princípio de transparência (Good Governance #1): sistemas de IA devem ser compreensíveis, mas modelos atuais são caixas-pretas", 
    tags: ["ia", "regulacao"],
    citacao: "O primeiro princípio de boa governança para IA (UNESCO/OCDE) exige 'transparência e explicabilidade' — mas LLMs comerciais (GPT-4, Claude, Gemini) são caixas-pretas: nem mesmo seus desenvolvedores conseguem explicar completamente como uma decisão foi gerada.",
    citacao_ref: "UNESCO (2021). Recommendation on the Ethics of AI, Principle 3 (Transparency); Lejniece, I. (2025); LeCun, Y. et al. (2024). On the Explainability of Large Language Models.",
    body: "Contradição fundamental entre o princípio de transparência e a natureza dos LLMs atuais. Se nem os desenvolvedores conseguem explicar por que o modelo gerou uma determinada saída, como exigir transparência de quem usa a IA para fins jurídicos? O princípio é desejável mas irrealizável com a tecnologia atual." },
    
  { id: "048", title: "Bellanger (2014): soberania digital como o 'destino digital de uma nação' — controle sobre dados equivale a controle sobre liberdade política", 
    tags: ["soberania", "dados", "direito"],
    citacao: "Bellanger introduziu o conceito de soberania digital como o 'destino digital de uma nação', sustentando que o controle sobre os dados equivale ao controle sobre a liberdade política do Estado. A capacidade de uma nação de determinar o tratamento de seus dados constitui pressuposto indispensável para o exercício de sua soberania no século XXI.",
    citacao_ref: "Bellanger, P. (2014). La souveraineté numérique. Paris: Éditions Stock.",
    body: "Obra fundadora do conceito de soberania digital. Bellanger argumenta que a soberania no século XXI não se define mais apenas por fronteiras territoriais, mas pela capacidade de controlar dados e infraestrutura digital. Referência central para a tese do artigo." },

  { id: "049", title: "Belli (2023): soberania digital em sentido amplo (regular) × estrito (controlar infraestrutura física)", 
    tags: ["soberania", "dados", "brasil"],
    citacao: "Belli aprofunda a análise ao distinguir dois sentidos de soberania digital. Em sentido amplo, corresponde à capacidade de um Estado de regular o ambiente digital. Em sentido estrito — o mais relevante para este artigo —, exige o controle da camada física: cabos submarinos, servidores, chips e infraestruturas que viabilizam o processamento de dados. Sem esse controle material, a regulação jurídica tende a permanecer no plano da validade formal, sem eficácia real.",
    citacao_ref: "Belli, L. (2023). Digital Sovereignty in the BRICS Countries. Cambridge: Cambridge University Press.",
    body: "Distinção crucial: o Brasil tem soberania digital em sentido amplo (LGPD, CF) mas não em sentido estrito (servidores são estrangeiros). A tese do artigo (validade vs. eficácia, Kelsen) encontra correspondência direta na teoria de Belli." },

  { id: "050", title: "Jiang & Belli (2023): dependência de infraestrutura digital estrangeira como vulnerabilidade estratégica dos BRICS", 
    tags: ["soberania", "dados", "brasil"],
    citacao: "Estudo sobre países BRICS demonstra que a dependência de infraestrutura digital estrangeira representa vetor concreto de vulnerabilidade estratégica. Ainda quando Estados do Sul Global adotam legislações avançadas de proteção de dados, a ausência de controle sobre servidores e pontos de troca de tráfego internacional submete parcela significativa de seus dados à jurisdição de terceiros Estados.",
    citacao_ref: "Jiang, M. & Belli, L. (2023). Digital Sovereignty in the BRICS Countries: Reclaiming Autonomy from Silicon Valley. Cambridge University Press, Cap. 10.",
    body: "Evidência empírica que sustenta a tese central: mesmo com leis como a LGPD, a falta de controle sobre infraestrutura física (servidores, cabos) torna a proteção jurídica insuficiente. O Brasil, como membro dos BRICS, compartilha dessa vulnerabilidade." },

  { id: "051", title: "Haesbaert (2004): multiterritorialidade — dados judiciais brasileiros existem em múltiplos territórios simultaneamente", 
    tags: ["soberania", "dados", "direito"],
    citacao: "Haesbaert propõe o conceito de multiterritorialidade: o fenômeno contemporâneo não é o desaparecimento do território, mas sua complexificação. Sujeitos e objetos — inclusive dados — passam a experimentar múltiplos territórios simultaneamente. Um dado judicial brasileiro armazenado em servidor Google Cloud nos EUA está, a um só tempo, no território jurídico brasileiro (LGPD) e no território infraestrutural norte-americano (CLOUD Act).",
    citacao_ref: "Haesbaert, R. (2004). O mito da desterritorialização: do 'fim dos territórios' à multiterritorialidade. Rio de Janeiro: Bertrand Brasil.",
    body: "Conceito geográfico com aplicação direta ao problema jurídico do artigo. A multiterritorialidade explica por que a LGPD pode ser formalmente válida mas ineficaz: os dados estão simultaneamente em duas jurisdições, e a infraestrutural (EUA) prevalece sobre a jurídica (Brasil)." },

  { id: "052", title: "AI Safety Report 2026: sistemas de IA de uso geral já causam danos reais no mundo", 
    tags: ["ia", "dados", "monitoramento"],
    citacao: "General-purpose AI systems are already causing real-world harm. Malicious actors have used AI-generated content to deceive and defraud; AI systems have produced harmful outputs due to errors and unexpected behaviours; and deployment is impacting labour markets, information ecosystems, and cybersecurity systems.",
    citacao_ref: "International AI Safety Report 2026. Chapter 2: Harms and Risks of General-Purpose AI. London: Department for Science, Innovation and Technology.",
    body: "Relatório internacional patrocinado por governos do G7 confirma que danos de IA não são futuros hipotéticos — já ocorrem. A adoção de IA no Judiciário brasileiro insere o país nesse cenário de risco real, sem as salvaguardas que o relatório recomenda." },

  { id: "053", title: "TJES + Gemini (Google): parceria institucional entre Judiciário brasileiro e Big Tech estrangeira", 
    tags: ["brasil", "ia", "soberania", "monitoramento"],
    citacao: "O Tribunal de Justiça do Espírito Santo (TJES) celebrou acordo de cooperação com a Google para uso de IA generativa (Gemini), formalizando parceria que envolve dados processuais em infraestrutura de Big Tech americana.",
    citacao_ref: "TJES. Notícia institucional: 'TJES e Google firmam parceria para uso de IA'. 2025. Disponível em: tjes.jus.br.",
    body: "Exemplo concreto da tese do artigo: um tribunal brasileiro adota IA de Big Tech estrangeira. O acordo submete dados processuais à infraestrutura de provedor americano, potencialmente sujeito ao CLOUD Act e FISA 702. Nota: a referência original a 'documento interno do artigo' foi substituída pela notícia pública do TJES." },

  { id: "054", title: "Reconhecimento recíproco Brasil-UE (jan/2026): adequação dos níveis de proteção de dados", 
    tags: ["brasil", "europa", "dados", "lgpd"],
    citacao: "Em janeiro de 2026, foi promulgada nova decisão de reconhecimento recíproco da adequação dos níveis de proteção de dados pessoais adotados pelo Brasil e pela União Europeia, facilitando fluxos de dados entre os dois blocos.",
    citacao_ref: "Comissão Europeia. Decisão de Adequação Brasil-UE. Janeiro de 2026. Disponível em: ec.europa.eu.",
    body: "Marco positivo na relação Brasil-UE para proteção de dados. No entanto, o reconhecimento recíproco não resolve o conflito com o CLOUD Act — dados brasileiros armazenados em servidores de Big Techs americanas continuam sujeitos à jurisdição dos EUA, independentemente do adequacy decision." },

  { id: "055", title: "JuLIA (TJPI): inteligência artificial do TJPI automatiza intimações e notificações via WhatsApp", 
    tags: ["brasil", "ia", "direito"],
    citacao: "O Projeto JuLIA (Justiça Auxiliada pela Inteligência Artificial), lançado em 11/10/2023 pelo TJPI, automatiza intimações de partes, envia notificações via WhatsApp, e realiza triagem inicial de processos. Desenvolvido pelo Opala Lab, processou 247 mil processos em 10 meses — um novo processo a cada 98 segundos.",
    citacao_ref: "TJ-PI (2023). JuLIA: inteligência artificial do TJ-PI. Disponível em: tjpi.jus.br; Queiroz, A.M. et al. (2024). O Impacto da IA na Advocacia Brasileira. REASE, 10(11).",
    body: "Exemplo de adoção de IA no Judiciário brasileiro com ganhos reais de eficiência, mas que levanta questões de segurança de dados: as intimações via WhatsApp dependem de plataforma estrangeira (Meta), e a triagem automatizada de processos opera sem transparência algorítmica." },

  { id: "056", title: "Watson (Recife): IA aumenta precisão em tarefas repetitivas de 75% para 95% em escritório de advocacia", 
    tags: ["ia", "advocacia", "brasil"],
    citacao: "A implantação do Watson, sistema de IA em escritório de advocacia no Recife, elevou a média de acertos em tarefas repetitivas (preenchimento de dados) de 75% para 95%, demonstrando ganhos mensuráveis de precisão com automação jurídica.",
    citacao_ref: "Nunes, D.; Rubinger, P.C.; Marques, A.L. (2018). Os Perigos do Uso da Inteligência Artificial na Advocacia. In: Revista de Direito e Tecnologia; Queiroz et al. (2024), op. cit.",
    body: "Dado empírico brasileiro que demonstra o potencial da IA para aumentar precisão em tarefas repetitivas. Contudo, o mesmo estudo adverte que a dependência excessiva de IA pode levar à perda de capacidade de julgamento crítico dos advogados juniores." },

  { id: "057", title: "Susskind (2013/2018): automação libera advogados de tarefas repetitivas para atividades estratégicas", 
    tags: ["ia", "advocacia"],
    citacao: "A automação libera os advogados de tarefas repetitivas, permitindo que se concentrem em atividades que realmente requerem julgamento e análise crítica. Esse movimento não apenas aumenta a eficiência, mas também melhora a qualidade do trabalho.",
    citacao_ref: "Susskind, R. (2013). Tomorrow's Lawyers: An Introduction to Your Future. Oxford: OUP; Susskind, R. & Susskind, D. (2018). The Future of the Professions. Oxford: OUP.",
    body: "Tese clássica de Susskind sobre o futuro das profissões jurídicas: a IA não substituirá advogados, mas advogados que usam IA substituirão os que não usam. O autor defende que a tecnologia permite realocar esforço humano para tarefas de maior valor agregado." },

  { id: "058", title: "PL 759/23: proposta de Política Nacional de Inteligência Artificial e agência reguladora própria", 
    tags: ["brasil", "ia", "regulacao"],
    citacao: "O Projeto de Lei 759/23, em tramitação na Câmara dos Deputados, sugere a criação de uma Política Nacional de Inteligência Artificial, incluindo a criação de agência reguladora própria para monitorar o uso da IA em diversas áreas, inclusive no direito.",
    citacao_ref: "PL 759/2023. Câmara dos Deputados. Dispõe sobre a criação da Política Nacional de Inteligência Artificial; Queiroz et al. (2024), op. cit.",
    body: "Iniciativa legislativa complementar ao PL 2338/2023. Enquanto o PL 2338 estabelece o marco legal substantivo da IA, o PL 759/23 propõe a estrutura institucional de fiscalização. Ambos estão em tramitação, deixando o setor jurídico sem regulação específica no interregno." },

  { id: "059", title: "PerfilADV (OAB/FGV, 2024): 95% dos advogados brasileiros afirmam que tecnologia facilita o trabalho jurídico", 
    tags: ["advocacia", "ia", "brasil"],
    citacao: "Segundo o PerfilADV — 1º estudo demográfico da advocacia brasileira (OAB/FGV, 2024) — 95% dos advogados brasileiros relatam que a tecnologia facilita (29%) ou facilita muito (66%) o trabalho. 43% adotaram trabalho remoto. A IA é vista como ferramenta essencial para eficiência.",
    citacao_ref: "PerfilADV: 1º estudo demográfico da advocacia brasileira. Coord. Simonetti, J.A.; Horn, R.A.; Salomão, L.F. Brasília: OAB Nacional; FGV Justiça, 2024. 210 p.",
    body: "Dado robusto (20.885 respondentes) que mostra adesão maciça à tecnologia na advocacia brasileira. Contrasta com o fato de que apenas 12% dos escritórios têm política formal de governança de IA — ou seja, usam tecnologia sem governança correspondente." },

  { id: "060", title: "Citron & Pasquale (2014): due process para predições automatizadas — marco teórico para regulação de IA", 
    tags: ["direito", "ia", "regulacao"],
    citacao: "Citron e Pasquale propõem que sistemas de pontuação e predição automatizados devem observar garantias mínimas de due process: notificação, transparência dos critérios, possibilidade de contestação e supervisão humana. Tais garantias são ainda mais necessárias quando a IA é aplicada ao sistema de justiça.",
    citacao_ref: "Citron, D.K. & Pasquale, F. (2014). The Scored Society: Due Process for Automated Predictions. Washington Law Review, 89(1), 1-34.",
    body: "Artigo seminal que estabelece o framework de 'due process algorítmico'. Citron e Pasquale argumentam que sistemas automatizados de tomada de decisão — incluindo IA jurídica — devem observar as mesmas garantias processuais exigidas do Estado. Aplicável diretamente à crítica do vácuo regulatório brasileiro." },

  { id: "061", title: "Spyropoulos & Androulaki (2023): African-Americans receberam grau de reincidência duas vezes maior no sistema COMPAS — viés algorítmico não intencional", 
    tags: ["ia", "direito", "europa"],
    citacao: "'The research showed that African-American individuals were attributed a degree of relapsing twice as high as other groups of the population, within a period of time of two years from imposition of sentence, without this result having been intended by the designers.' Os autores também concluem que 'at the present phase of evolution of machine learning techniques, the deduction of reliable results as to the prediction of court decisions is not possible' e que, nos termos do art. 22 do GDPR, 'persons concerned can deny a decision which is exclusively based on automated processing'.",
    citacao_ref: "Spyropoulos, F.; Androulaki, E. Aspects of Artificial Intelligence on E-Justice and Personal Data Limitations. Journal of Legal, Ethical and Regulatory Issues, v. 26, n. 3, p. 1-8, 2023.",
    body: "Artigo examina aplicações de IA em sistemas judiciais (justiça preditiva, ODR, chatbots). Um ponto central: o sistema COMPAS (EUA) atribuiu grau de reincidência duas vezes maior a afro-americanos sem que os designers tivessem intencionado — demonstrando que viés algorítmico pode ser não intencional e indetectável pelos criadores. O artigo também aponta que o ML atual não é confiável para predizer decisões judiciais." },

  { id: "062", title: "Syllos (2024): LGPD é ambígua para responsabilizar ML; EUA têm mosaico fragmentado sem lei federal", 
    tags: ["dados", "lgpd", "eua", "regulacao"],
    citacao: "'No Brasil, a LGPD define parâmetros para coleta, tratamento e finalidade, mas permanece ambígua quanto ao escopo da responsabilização aplicada a sistemas de aprendizado de máquina que operam com bases complexas e processos inferenciais autônomos. Nos Estados Unidos, a ausência de uma lei federal abrangente acentua esse cenário, criando um mosaico regulatório fragmentado sustentado por legislações estaduais, diretrizes setoriais e enforcement por agências como a Federal Trade Commission.' A autora também afirma que 'modelos treinados com dados pessoais continuam suscetíveis à memorização involuntária, reidentificação e impactos desiguais sobre grupos vulneráveis'.",
    citacao_ref: "Syllos, W.A.V. Interação entre Inteligência Artificial e Proteção de Dados: Regimes de Responsabilização no Brasil e nos Estados Unidos para Modelos Treinados com Dados Pessoais. 2024.",
    body: "Análise comparativa Brasil vs. EUA. Syllos documenta casos de discriminação algorítmica (Clearview AI, Amazon, Cambridge Analytica, OpenAI) e propõe framework de governança, auditoria e compliance. Cita Ohm (2019): 'as tecnologias de análise massiva de dados tornaram praticamente impossível tratar a anonimização como um processo estático e definitivo' e Citron (2022): 'o caráter automatizado de um sistema não elimina a responsabilidade por discriminação'." },

  { id: "063", title: "Oliveira (2023): IA encontra limitações na LGPD; art. 20, §2º permite auditoria de IA para verificar discriminação", 
    tags: ["brasil", "ia", "lgpd", "dados"],
    citacao: "'A IA, apesar de inexistir legislação específica que a regulamente, encontra as suas limitações quanto ao tratamento de dados no regramento estabelecido pela LGPD. Sendo inviável a sua utilização sem o respeito a essa legislação.' Sobre transparência, a autora afirma que 'o parágrafo segundo do artigo 20 evidencia a barreira imposta à obtenção de transparência pelo titular [...] ao limitar seu acesso à revelação de segredos comercial ou industrial', mas 'determina a possibilidade de auditar IA para verificar aspectos discriminatórios no tratamento automatizado de dados'.",
    citacao_ref: "Oliveira, M.V.G. Tratamento de Dados pela Inteligência Artificial. Revista Foco, Curitiba, v. 16, n. 8, e2662, p. 1-10, 2023. DOI: 10.54751/revistafoco.v16n8-045.",
    body: "Oliveira demonstra que os 10 princípios do art. 6º da LGPD são aplicáveis à IA. Um ponto: a LGPD já oferece instrumentos de controle sobre IA mesmo sem legislação específica — o art. 20, §2º permite auditoria de sistemas automatizados para verificar discriminação, ainda que o acesso à transparência plena seja limitado por segredo comercial. A autora documenta caso de condenação de empresa de viagens a R\$ 7,5 milhões por discriminação algorítmica via geolocalização." },

  { id: "064", title: "Toffoli (STF) no 1º Fórum FGV: 85% dos processos digitalizados; VICTOR reduz de 1 hora para 5 segundos", 
    tags: ["brasil", "ia", "direito"],
    citacao: "'85% dos processos do Judiciário estão em plataformas digitais. Um volume inédito no mundo.' Sobre o VICTOR: 'o que antes exigiria dedicação de quase uma hora de uma pessoa ou grupo, a IA resolve em cerca de 5 segundos, identificando se aquela demanda tem repercussão geral reconhecida.' Humberto Martins (STJ/CNJ) afirmou: 'a extração de conhecimento gerado pelo machine learning requer análise de dados. Quanto maior a quantidade de dados, mais insumos para modelos de IA. Por outro lado, a legislação impõe responsabilidade institucional de tratamento cuidadoso dos dados'.",
    citacao_ref: "Salomão, L.F. (org.). Anais do 1º Fórum de Direito e Tecnologia — Artificial Intelligence Applied to Conflict Management in the Judiciary Scope. Rio de Janeiro: FGV/CIAPJ, 2020. ISBN 978-65-86289-14-5.",
    body: "Anais do 1º Fórum de Direito e Tecnologia da FGV (2020), com participação de Toffoli (STF), Humberto Martins (STJ/CNJ), Dierle Nunes e outros. Documenta que o Brasil já tinha 85% dos processos digitalizados e o VICTOR como ferramenta de triagem. Humberto Martins destaca a tensão entre volume de dados para treinar IA e a responsabilidade institucional de tratamento cuidadoso. O Brasil se baseava na Carta Ética Europeia (CEPEJ) por não ter parâmetro nacional." },

  { id: "065", title: "Araujo et al. (2022) — MPT: EC 115/2022 eleva proteção de dados a direito fundamental; discriminação algorítmica nas relações de trabalho", 
    tags: ["brasil", "direito", "dados", "advocacia"],
    citacao: "A proteção dos dados pessoais, inclusive nos meios digitais, foi recentemente erigida a status constitucional, ao ser incluída no rol do artigo 5º da Constituição Federal de 1988, por meio da EC nº 115/2022. Vive-se a 'Era da Algocracia', orientados, impulsionados e influenciados pelo uso exacerbado de algoritmos e decisões automatizadas.",
    citacao_ref: "Araujo, A.R. et al. (coord.) (2022). O Uso de Dados Pessoais e Inteligência Artificial na Relação de Trabalho: Proteção, Discriminação, Violência e Assédio Digital. Brasília: Ministério Público do Trabalho. ISBN 978-65-89468-23-3.",
    body: "Coletânea do MPT com 17 artigos sobre discriminação algorítmica no trabalho. Destaques: caso Amazon (2018) com viés de gênero em recrutamento, caso Xsolla (demissões por scoring algorítmico), análise do Art. 20 da LGPD vs. silêncio da CLT sobre decisões automatizadas, e exigência de princípios FATE (fairness, accuracy, transparency, ethics) nas relações trabalhistas." },

  { id: "066", title: "Paiva Gabriel, Porto & Araújo (2025): 'reserva de humanidade' como novo direito fundamental para impedir substituição do juiz por IA", 
    tags: ["brasil", "ia", "direito", "regulacao"],
    citacao: "'o imperioso controle humano sobre a IAG — a reserva de humanidade (Solé, 2019, p. 28) — deve ser visto como um novo direito fundamental. Esse conceito propõe um marco regulatório ético para a evolução tecnológica, garantindo que a máquina permaneça sob a supervisão do ser humano, de maneira a assegurar a proteção integral dos direitos constitucionalmente tutelados.' Os autores concluem que 'a decisão final quanto ao conteúdo de uma peça jurídica, seja qual for ela, carregada de valorações e de sensibilidade ao contexto, deve permanecer como prerrogativa exclusiva do ser humano'.",
    citacao_ref: "Paiva Gabriel, A. de; Porto, F.R.; Araújo, V.S. de. Inteligência artificial, precedentes e a Resolução CNJ 615/2025. Revista da EMERJ, Rio de Janeiro, v. 27, e649, p. 1-17, 2025. DOI: 10.70622/2236-8957.2025.649.",
    body: "Artigo publicado na Revista da EMERJ (Qualis) por três juristas — sendo um juiz auxiliar do STF e um juiz auxiliar da Presidência do CNJ. Os autores propõem a 'reserva de humanidade' como novo direito fundamental, argumentando que a IA generativa deve ser apenas auxílio à decisão, nunca substituta do raciocínio jurídico humano. Este conceito é diretamente relevante para a tese de soberania digital: se a decisão judicial depende de infraestrutura de IA estrangeira cujo funcionamento é opaco, a 'reserva de humanidade' fica comprometida." },

  { id: "067", title: "Paiva Gabriel, Porto & Araújo (2025): CNJ 615 tem lacunas — capacitação técnica insuficiente, opacidade de LLMs e risco de supervisão humana meramente formal", 
    tags: ["brasil", "ia", "direito", "regulacao"],
    citacao: "'A complexidade e a opacidade de muitos sistemas de IA podem dificultar o controle [humano] na prática. Os magistrados e servidores precisam não apenas de capacitação técnica, mas, também, de ferramentas que tornem os sistemas efetivamente compreensíveis e auditáveis, permitindo uma supervisão significativa.' Os autores alertam que 'a operacionalização dessa capacitação em escala nacional representa um desafio considerável' e que 'o desenvolvimento de métodos de explicabilidade algorítmica adequados ao contexto judicial representa uma área de pesquisa promissora e essencial'.",
    citacao_ref: "Paiva Gabriel, A. de; Porto, F.R.; Araújo, V.S. de. Inteligência artificial, precedentes e a Resolução CNJ 615/2025. Revista da EMERJ, Rio de Janeiro, v. 27, e649, p. 1-17, 2025. DOI: 10.70622/2236-8957.2025.649.",
    body: "Os próprios autores que elogiam o caráter inovador da CNJ 615 reconhecem lacunas importantes: (i) a opacidade dos LLMs torna a 'supervisão humana' prevista na resolução potencialmente ilusória — um juiz não pode supervisionar efetivamente o que não compreende; (ii) a capacitação técnica em escala nacional é inviável no curto prazo; (iii) faltam ferramentas de explicabilidade algorítmica adaptadas ao contexto judicial. Estas lacunas fortalecem a tese de que a CNJ 615, embora necessária, não resolve o problema estrutural de soberania digital." },

  { id: "068", title: 'Reichelt (2026) — CNJ 615 cria self-restraint do Judiciário; classificação de IA generativa como baixo risco é contraditória', 
    tags: ["brasil", "ia", "direito", "regulacao"],
    citacao: "'o quadro normativo criado pelo próprio Conselho Nacional de Justiça acaba servindo como baliza para que se possa rediscutir o alcance do direito ao due process of law, avançando em direção a comandos estabelecidos em um esforço de self-restraint.' O autor aponta contradição na classificação de riscos: 'a rotulação da produção de textos de apoio para facilitar a confecção de atos judiciais, ainda que com as salvaguardas normativas mencionadas, como sendo de um uso de inteligência artificial de baixo risco.' E conclui que 'a catalogação de riscos no uso e desenvolvimento de agentes de inteligência artificial pela Resolução CNJ nº 615/2025 serve como indicativo de pontos nos quais há o perigo de surgimento de invalidades de decisões judiciais proferidas com apoio em tal tecnologia'.",
    citacao_ref: 'Reichelt, L.A. A Resolução CNJ nº 615/2025 e o Emprego de Inteligência Artificial com Vistas à Prolação de Decisões Judiciais no Direito Processual Civil. REDP, Rio de Janeiro, v. 27, n. 2, p. 305-325, maio/ago. 2026.',
    body: 'Reichelt (PUCRS/UFRGS) analisa a CNJ 615 sob o prisma dos direitos fundamentais processuais. Três contribuições: (i) o conceito de self-restraint do próprio CNJ; (ii) a classificação da IA generativa para redação de atos judiciais como "baixo risco" é contraditória com os riscos documentados de alucinações; (iii) a catalogação de riscos da resolução serve como indicativo de nulidades (errores in iudicando) que devem ser reconhecidas ex officio. O autor cita pesquisa do CNJ (2024) mostrando que 75% dos magistrados brasileiros usam ChatGPT ou outra IA generativa.' },

  { id: "069", title: 'Siqueira, Cardin & Saldanha (2026) — 140 projetos de IA no Judiciário; CNJ 615 proíbe perfilamento mas auditoria é insuficiente', 
    tags: ["brasil", "ia", "direito"],
    citacao: "'A implementação de inteligência artificial no Poder Judiciário brasileiro de 2019 a 2026 representa processo de transformação institucional significativa.' Os autores documentam 'o crescimento de 140 projetos em operação, distribuído entre 62 órgãos judiciários, com representação em todos os ramos de Justiça, indica capilarização genuína de inovação tecnológica.' Sobre alucinações: 'este fenômeno de geração de informações falsas (denominado alucinação) constitui limitação fundamental ainda não completamente resolvida em sistemas de IA generativa atuais.' Sobre vieses: 'proibição normativa é condição necessária, mas não suficiente; é imperativo que instituições implementem procedimentos técnicos robustos de auditoria de vieses.' Os desafios incluem 'escassez de profissionais qualificados, risco de alucinações e disseminação de informações falsas, possibilidade de vieses algorítmicos, questões de governança de dados'.",
    citacao_ref: 'Siqueira, D.P.; Cardin, V.S.G.; Saldanha, R.R. Artificial Intelligence in Brazilian Courts. REMUNOM, São Luís, v. 13, n. 04, p. 1-43, 2026. DOI: 10.66104/8022t344.',
    body: 'Artigo mais abrangente já publicado sobre IA no Judiciário brasileiro, analisando 10 projetos principais (Victor, JuLIA, Hannah, STJ Logos, LexIA, ELIS, Projeto Larry, HORUS/AMON/TOTH, Sócrates/Athos, Assistente TJMG). Redução de até 95% em tempo de processamento, aumento de 67% em execuções finalizadas. Porém, sucesso não pode ser medido exclusivamente por eficiência — deve incorporar "avaliação de impactos sobre direitos fundamentais, equidade processual e legitimidade democrática". A CNJ 615 é descrita como "progressão significativa" em relação à CNJ 332/2020, mas a ausência de métricas objetivas de auditoria de vieses e o risco de alucinações (caso concreto REsp 2.207.929/MG, STJ 2025) são lacunas.' },

  { id: "070", title: 'Melo (2026) — ANPD enfrenta obstáculos estruturais, orçamentários e de autonomia decisória', 
    tags: ["brasil", "dados", "regulacao"],
    citacao: "'a atuação da ANPD enfrenta obstáculos estruturais, orçamentários e de autonomia decisória, os quais limitam sua capacidade de garantir, de forma plena, o direito fundamental à proteção de dados no Brasil.' O autor conclui que, 'embora a LGPD represente importante marco normativo', as restrições da ANPD comprometem sua eficácia fiscalizatória.",
    citacao_ref: 'Melo, G.P.F. A Efetividade da LGPD na Garantia do Direito Fundamental à Proteção de Dados: Uma Análise do Papel Fiscalizador da ANPD. Revista Ibero-Americana de Humanidades, Ciências e Educação, São Paulo, v. 12, n. 4, p. 1-22, abr. 2026. DOI: 10.51891/rease.v12i4.25624.',
    body: 'Melo analisa o papel fiscalizador da ANPD e identifica três obstáculos centrais: estruturais (falta de pessoal e infraestrutura), orçamentários (recursos insuficientes) e de autonomia decisória (vinculação ao Poder Executivo). O estudo é diretamente relevante para o ponto 3 do artigo (problemas que a soberania digital enfrenta), pois documenta que a principal autoridade de proteção de dados brasileira não tem condições estruturais de exercer seu poder de polícia contra big techs estrangeiras.' },

  { id: "071", title: 'SBSeg/APDados (2025) — LGPD enfrenta desafios de compliance; ANPD tem dificuldade para processar volume de violações', 
    tags: ["brasil", "dados", "regulacao"],
    citacao: "'a ANPD vem enfrentando desafios em relação à quantidade crescente de processos relacionados a violações da LGPD no Brasil, colocando pressão sobre o sistema regulatório.' O estudo quantitativo analisa a base APDados (2020-2024) e conclui que 'a aplicação da LGPD não tem sido homogênea em todas as organizações'.",
    citacao_ref: 'Autores diversos. Aplicação e Compliance da LGPD: Uma análise a partir da base de dados APDados no período de 2020 a 2024. In: Anais Estendidos do SBSeg 2025 — WTICG, 2025. DOI: 10.5753/sbseg_estendido.2025.10725.',
    body: 'Artigo apresentado no SBSeg 2025 (Simpósio Brasileiro de Segurança da Informação e de Sistemas Computacionais) que analisa quantitativamente a base APDados — banco de dados público da ANPD com todos os processos administrativos sancionadores. Documenta que o aumento de violações de dados pressiona o sistema regulatório e que a fiscalização da ANPD não acompanha o ritmo.' },

  { id: "072", title: 'Primeira multa ANPD (2024) — primeiro caso concreto de sanção; caráter pedagógico vs. efetividade',

    citacao: "'a aplicação da primeira multa sancionatória pela Autoridade Nacional de Proteção de Dados representa um marco significativo na implementação efetiva da política pública de proteção de dados pessoais.' O artigo enfatiza 'a importância de manter o caráter pedagógico da sanção para que ocorra a implementação eficaz'.",
    citacao_ref: 'Autores. Um Marco Significativo na Implementação Efetiva da Política Pública de Proteção de Dados Pessoais: A Primeira Multa Aplicada pela ANPD. Revista de Direito, Estado e Sociedade, v. 9, n. 2, 2024. DOI: 10.26668/indexlawjournals/2525-9881/2023.v9i2.10058.',
    body: 'Analisa o primeiro caso de multa aplicada pela ANPD (Relatório de Instrução nº 1/2023/CGF/ANPD, processo sancionador contra a Telekall Infoservice). O artigo documenta que a ANPD priorizou o caráter pedagógico da sanção, mas levanta a questão central: se a abordagem educativa é suficiente para big techs que faturam bilhões. Relevante para contrapor a leitura de que a ANPD "não faz nada" — ela fez, mas de forma limitada.' },

  { id: "073", title: 'Modanez (2026) — Cloud Act como "imperialismo jurídico digital"; amplia acesso a dados independentemente da localização', 
    tags: ["internacional", "dados", "soberania"],
    citacao: "'O Cloud Act ampliou a capacidade do governo norte-americano de requisitar dados armazenados globalmente por empresas sob sua jurisdição, independentemente da localização física dos servidores, configurando um mecanismo de imperialismo jurídico digital e de erosão da soberania informacional de outros Estados.'",
    citacao_ref: 'Modanez, C.C. Blindagem Jurídica e Soberania Digital: A Estratégia Chinesa diante do Cloud Act dos EUA. BRICS Strategy and Technology Review, v. 1, n. 1, 2026. DOI: 10.65895/bstr.v1n1.7.',
    body: 'Modanez (FESPSP) analisa a estratégia chinesa de blindagem jurídica frente ao Cloud Act. O conceito de "imperialismo jurídico digital" é diretamente útil para o artigo: a tese de que o Cloud Act não é apenas uma lei de acesso a dados, mas um instrumento de projeção de soberania dos EUA sobre dados armazenados em qualquer território. Embora o foco seja China, o marco teórico se aplica integralmente ao Brasil, que não possui legislação equivalente de data residency ou blindagem jurídica.' },

  { id: "074", title: 'Freire (2025) — soberania digital brasileira enfrenta desafios constitucionais frente ao poder transnacional das big techs', 
    tags: ["brasil", "dados", "soberania"],
    citacao: "'O trabalho apresentado versa sobre os desafios que o Brasil enfrenta para conquistar sua soberania digital frente ao poder transnacional das grandes empresas de tecnologia, conhecidas como big techs.' A autora analisa as GAFAM (Google, Apple, Facebook/Meta, Amazon, Microsoft) e sua influência sobre a autonomia digital brasileira.",
    citacao_ref: 'Freire, S.N.R. Soberania Digital e Direitos Fundamentais: Desafios Constitucionais Frente ao Poder das Big Techs no Brasil. Revista Disserata, Rio de Janeiro, v. 2, n. 2, e220020, jan./dez. 2025. DOI: 10.63160/3085-6892.2025.37.',
    body: 'Freire (UVA) mapeia os desafios constitucionais para a soberania digital brasileira diante do domínio das big techs. A contribuição específica: documenta que a dependência de infraestrutura digital estrangeira cria uma vulnerabilidade jurídico-constitucional que a LGPD, por si só, não resolve. Relevante para fundamentar que a soberania digital não é apenas questão de lei, mas de capacidade tecnológica e infraestrutura.' },

  { id: "075", title: 'Veras & Lelis (2026) — CNJ 615 incorpora parâmetros éticos internacionais; efetividade depende de implementação prática', 
    tags: ["brasil", "ia", "direito"],
    citacao: "'A resolução incorpora, de forma substancial, os principais parâmetros éticos internacionais para o uso responsável da inteligência artificial no serviço judiciário, revelando potencial normativo relevante para a salvaguarda da dignidade humana dos jurisdicionados, desde que suas disposições sejam efetivamente observadas e implementadas na prática institucional.'",
    citacao_ref: 'Veras, F.A.; Lelis, H.R. A Resolução CNJ nº 615/2025: Os Algoritmos e a Dignidade Humana. RIAHCE, v. 12, n. 1, 2026. DOI: 10.51891/rease.v12i1.24015.',
    body: 'Veras e Lelis fazem análise de conformidade entre a CNJ 615 e os parâmetros éticos internacionais (UNESCO, OCDE, CEPEJ). Concluem que a resolução está alinhada, mas com uma ressalva crucial: "desde que suas disposições sejam efetivamente observadas e implementadas na prática". Essa condicional é o cerne do problema — a norma existe, mas a fiscalização do cumprimento e o monitoramento são lacunas que persistem.' },

  { id: "076", title: 'Santos & Coelho (2025) — desconexão entre diretrizes CNJ 615 e realidade empírica dos tribunais; auditorias regionais são insuficientes', 
    tags: ["brasil", "ia", "direito", "regulacao"],
    citacao: "'A pesquisa aborda o problema da desconexão entre as diretrizes normativas e a realidade empírica, evidenciada por lacunas na implementação prática e governança da IA no Poder Judiciário, o que compromete princípios éticos.' Os resultados revelam que 'desafios persistem, exigindo políticas obrigatórias, acessos institucionais e auditorias regionais'.",
    citacao_ref: 'Santos, J.C.V.; Coelho, V.L. Inteligencia Artificial en el Poder Judicial Brasileiro: Ética, Supervisión y los Desafíos de la Resolución 615/2025 del CNJ. ERR01, São José dos Pinhais, v. 10, n. 6, p. 1-17, 2025. DOI: 10.56238/err01v10n6-051.',
    body: 'Artigo que confronta as diretrizes da CNJ 615 com os dados do relatório "Pesquisa Inteligência Artificial no Judiciário 2024" do CNJ. A constatação central é que existe um abismo entre o que a resolução determina e o que realmente ocorre nos tribunais. A análise do caso Zeus IA (TJPA) ilustra como projetos bem-sucedidos convivem com ausência de governança sistêmica. Reforça o argumento de que a norma, por si só, não transforma a realidade.' },

  { id: "077", title: 'Pinho & Lima Neto (2026) — LLMs operam por reprodução probabilística de padrões, sem compreensão semântica; incompatíveis com substituição do julgador', 
    tags: ["brasil", "ia", "direito"],
    citacao: "'tais sistemas, embora produzam respostas linguisticamente sofisticadas, operam por reprodução probabilística de padrões, sem compreensão semântica genuína, deliberação consciente ou raciocínio jurídico em sentido próprio.' Os autores concluem que 'a inteligência artificial pode atuar validamente como ferramenta de apoio à atividade judicial, mas não como instância autônoma de deliberação, fundamentação ou julgamento'.",
    citacao_ref: 'Pinho, D.A.; Lima Neto, F.V. O Uso de Inteligência Artificial nas Decisões Judiciais à Luz da Resolução CNJ nº 615/2025. Cadernos Cajuína, v. 11, n. 4, 2026. DOI: 10.52641/cadcajv11i4.2454.',
    body: 'Pinho (UFES) e Lima Neto examinam a incompatibilidade técnica entre LLMs e a teoria processual da decisão. O artigo é relevante por demonstrar que a limitação não é apenas jurídica ou ética, mas epistemológica: LLMs não "pensam" ou "raciocinam", apenas reproduzem probabilidades. Isso fortalece a tese de que a supervisão humana prevista na CNJ 615 pode ser insuficiente quando o juiz não compreende a natureza do instrumento que usa.' },

  { id: "078", title: 'Sarlet & Rodriguez (2022) — ANPD precisa de estruturação independente como autarquia em regime especial',

    citacao_ref: 'Sarlet, G.B.S.; Rodriguez, D.P. Autoridade Nacional de Proteção de Dados (ANPD) e os Desafios Tecnológicos. Revista Direitos Fundamentais e Democracia, v. 27, n. 3, p. 217-253, 2022. DOI: 10.25192/issn.1982-0496.rdfd.v27i32285.',
    body: 'Sarlet (PUCRS) e Rodriguez analisam a necessidade de a ANPD ser estruturada como autarquia especial para alcançar autonomia técnica. A mera separação formal da Administração Direta é insuficiente. Fundamenta o argumento de que a superagência é necessária mas ainda não foi implementada.' },

  { id: "079", title: 'Pontes & Lanzillo (2026) — PL 2338/2023: princípios como mandados de otimização; regulação equilibrada entre inovação e direitos fundamentais',

  { id: "081", title: 'Mugart & Torres (2026) — supervisão humana significativa é requisito de legitimidade constitucional; insuficiência de métricas quantitativas',

    body: 'Mugart (UFMS) e Torres (USP/UFMS) argumentam que a supervisão humana precisa ser "significativa" para cumprir função constitucional. Introduzem o conceito de "delegação implícita do poder de julgar". Conecta-se com a crítica de que a CNJ 615 estabelece supervisão humana genérica que pode ser insuficiente diante da opacidade dos LLMs.' }
];


// Extract unique tags
const allTags = [...new Set(findings.flatMap(f => f.tags))].sort();

function render() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const activeTag = document.querySelector('.tag-btn.active')?.dataset.tag || 'all';
  
  let filtered = findings.filter(f => {
    // Tag filter
    if (activeTag !== 'all' && !f.tags.includes(activeTag)) return false;
    // Search
    if (search) {
      const searchable = (f.title + ' ' + f.body + ' ' + f.citacao + ' ' + f.citacao_ref + ' ' + f.tags.join(' ')).toLowerCase();
      return searchable.includes(search);
    }
    return true;
  });

  const list = document.getElementById('findingsList');
  const countEl = document.getElementById('footerCount');
  
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><p>Nenhum achado encontrado para "${search}"</p></div>`;
    countEl.textContent = '0 achados';
    document.getElementById('resultCount').textContent = '0 achados';
    return;
  }

  list.innerHTML = filtered.map(f => `
    <div class="finding" onclick="toggleFinding(this)">
      <div class="finding-header">
        <div class="finding-num">${f.id}</div>
        <div class="finding-content">
          <div class="finding-title">${f.title}</div>
          <div class="finding-tags">
            ${f.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="finding-body">
        <p>${f.body}</p>
        <div class="citacao" onclick="event.stopPropagation(); this.classList.toggle('expanded-cit')">
          <span class="citacao-label">Citação</span>
          <div class="citacao-texto">${f.citacao}</div>
          <span class="expand-hint">↕ expandir citação</span>
        </div>
        <div style="font-size:0.75rem;color:#555577;margin-top:8px;font-style:italic;">${f.citacao_ref}</div>
      </div>
    </div>
  `).join('');

  countEl.textContent = `${filtered.length} achados`;
  document.getElementById('resultCount').textContent = `${filtered.length} de ${findings.length} achados`;
}

function toggleFinding(el) {
  el.classList.toggle('expanded');
}

// Render tags bar
function renderTags() {
  const bar = document.getElementById('tagsBar');
  bar.innerHTML = `<button class="tag-btn tag-all active" data-tag="all" onclick="filterTag('all', this)">📋 Todos</button>` +
    allTags.map(t => `<button class="tag-btn tag-${t}" data-tag="${t}" onclick="filterTag('${t}', this)">${t.charAt(0).toUpperCase() + t.slice(1)}</button>`).join('');
}

function filterTag(tag, btn) {
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', render);

// Init
renderTags();
render();
</script>
